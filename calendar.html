<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar | Holmen Women’s Wrestling</title>
<style>
:root{--maroon:#6d1730;--dark:#3f0b1a;--light:#f5f5f7;--ink:#19191d;--muted:#676b73;--border:#e1e2e5}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--light);color:var(--ink)}
a{color:inherit}
.header{height:74px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
.brand,.back{font-weight:900;color:var(--maroon);text-decoration:none}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--maroon),var(--dark));color:#fff;padding:58px 20px}
.hero-watermark{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;z-index:0;pointer-events:none;overflow:hidden}
.hero-watermark img{width:min(700px,70%);opacity:.12;object-fit:contain;transform:translateY(45%);}
.hero .container{position:relative;z-index:1}
.container{width:min(1000px,calc(100% - 28px));margin:auto}
.eyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:.76rem;font-weight:900;color:#efc8d4}
h1{font-size:clamp(2.5rem,6vw,4.6rem);letter-spacing:-.06em;margin:8px 0}
.hero p{max-width:760px;line-height:1.65;color:#f0dde3}
.content{padding:40px 0 70px}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.button{min-height:48px;padding:0 22px;border-radius:999px;background:var(--maroon);color:#fff;font-weight:850;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.button:hover{background:var(--dark)}
.button.secondary{background:#fff;color:var(--maroon);border:1px solid #d7b7c1}
.note{font-size:.85rem;color:var(--muted);margin:0 0 24px}
.calendar-card{background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 10px 28px rgba(20,12,15,.06)}
.calendar-card iframe{width:100%;height:650px;border:0;display:block}
@media(max-width:600px){.header{padding:0 14px}.calendar-card iframe{height:500px}}
</style>
</head>
<body>
<header class="header">
<a class="brand" href="index.html">Holmen Women’s Wrestling</a>
<a class="back" href="index.html">Back to Home</a>
</header>

<section class="hero">
<div class="hero-watermark"><img src="assets/images/logo.png" alt=""></div>
<div class="container">
<div class="eyebrow">Stay Up To Date</div>
<h1>Calendar</h1>
<p>Practices, meets, and team events — all in one place.</p>
</div>
</section>

<main class="content">
<div class="container">

<div class="actions">
<a class="button" href="https://calendar.google.com/calendar/u/0/embed?src=bd7296a5f419a1e296fff2454f851b4b2990afb06fc321bf1171051cedfc8c4c@group.calendar.google.com&ctz=America/Chicago" target="_blank" rel="noopener">Open in Google Calendar</a>
<a class="button secondary" href="webcal://calendar.google.com/calendar/ical/bd7296a5f419a1e296fff2454f851b4b2990afb06fc321bf1171051cedfc8c4c%40group.calendar.google.com/public/basic.ics">Add to Apple Calendar</a>
</div>
<p class="note">Note: After the calendar opens in a new tab, the "Add to Google Calendar" button is at the bottom of that page.</p>

<div class="calendar-card">
<iframe src="https://calendar.google.com/calendar/embed?src=bd7296a5f419a1e296fff2454f851b4b2990afb06fc321bf1171051cedfc8c4c%40group.calendar.google.com&ctz=America%2FChicago" frameborder="0" scrolling="no"></iframe>
</div>

</div>
</main>
</body>
</html>
